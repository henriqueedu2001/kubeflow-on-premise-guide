# PIPELINE DEFINITION
# Name: train-yolo-pipeline
# Description: Treinamento de YOLO
components:
  comp-train-yolo-component:
    executorLabel: exec-train-yolo-component
deploymentSpec:
  executors:
    exec-train-yolo-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - train_yolo_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.15.2'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train_yolo_component():\n    import json\n    from pathlib import\
          \ Path\n    from ultralytics import YOLO\n    model = YOLO('yolov8n.pt')\n\
          \    dataset = 'coco8.yaml'\n\n    model.train(\n        data=dataset,\n\
          \        epochs=10,\n        imgsz=640,\n        batch=16,\n        project='runs',\n\
          \        name='yolo_training_example'\n    )\n\n    model_path = Path('runs/detect/runs/yolo_training_example/weights/best.pt')\n\
          \n    trained_model = YOLO(model_path)\n\n    metrics = trained_model.val()\n\
          \n    results = {\n        'precision': float(metrics.box.mp),\n       \
          \ 'recall': float(metrics.box.mr),\n        'map50': float(metrics.box.map50),\n\
          \        'map50_95': float(metrics.box.map),\n    }\n\n    print('\\n===\
          \ M\xC9TRICAS ===')\n    for k, v in results.items():\n        print(f'{k}:\
          \ {v:.4f}')\n\n    with open('metrics.json', 'w') as f:\n        json.dump(results,\
          \ f, indent=4)\n\n    print(f'\\nModelo salvo em: {model_path}')\n    print('M\xE9\
          tricas salvas em: metrics.json')\n    return\n\n"
        image: ultralytics/ultralytics:latest
pipelineInfo:
  description: Treinamento de YOLO
  name: train-yolo-pipeline
root:
  dag:
    tasks:
      train-yolo-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train-yolo-component
        taskInfo:
          name: train-yolo-component
schemaVersion: 2.1.0
sdkVersion: kfp-2.15.2
